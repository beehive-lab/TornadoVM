name: JDKs Test

on:
  push:
    branches:
      - feat/jdk-matrix-ci
  workflow_dispatch:
    inputs:
      full_build:
        description: 'Run full build across all JDKs'
        required: false
        default: 'false'
        type: boolean

jobs:
  code-quality:
    runs-on: self-hosted
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkstyle
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          #./mvnw checkstyle:check

  build-and-test:
    runs-on: self-hosted
    needs: code-quality
    timeout-minutes: 120
    # Ensure only one JDK job uses the GPU at a time
    concurrency:
      group: tornadovm-gpu-tests-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: true
      max-parallel: 1  # Sequential execution - only one JDK at a time due to GPU
      matrix:
        jdk:
          - name: OpenJDK 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
            profile: jdk21
          - name: GraalVM 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/graalvm-community-openjdk-21.0.1+12.1
            profile: graal-jdk-21
          - name: Mandrel 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/mandrel-java21-23.1.0.0-Final
            profile: jdk21
          - name: Zulu 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/zulu21.28.85-ca-jdk21.0.0-linux_x64
            profile: jdk21
          - name: Corretto 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/amazon-corretto-21.0.3.9.1-linux-x64
            profile: jdk21
          - name: Microsoft 21
            java_home: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3+9
            profile: jdk21
    env:
      JAVA_HOME: ${{ matrix.jdk.java_home }}
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADO_SDK: ${{ github.workspace }}/bin/sdk
      PATH: /opt/maven/bin:${{ github.workspace }}/bin:/usr/local/bin:/usr/bin:/bin
      CMAKE_ROOT: /opt/jenkins/cmake-3.25.2-linux-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify JDK - ${{ matrix.jdk.name }}
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Testing with: ${{ matrix.jdk.name }}"
          echo "JAVA_HOME: $JAVA_HOME"
          java -version

      - name: Setup Python venv
        run: |
          python3 -m venv ${{ github.workspace }}/venv
          source ${{ github.workspace }}/venv/bin/activate
          pip install --upgrade pip
          pip install tqdm psutil

      - name: Copy Graal JARs
        run: |
          mkdir -p $TORNADO_ROOT/graalJars
          cp /opt/graalJars/* $TORNADO_ROOT/graalJars/

      - name: Build TornadoVM (all backends)
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          make ${{ matrix.jdk.profile }} BACKEND=ptx,opencl,spirv

      - name: Show available devices
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado --devices

      # ============== PTX Backend Tests ==============
      - name: "PTX: Unit Tests"
        timeout-minutes: 45
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test --verbose -J"-Dtornado.unittests.device=0:0 -Dtornado.ptx.priority=100"

      - name: "PTX: Heap Fail Test"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test -V -J"-Dtornado.unittests.device=0:0 -Dtornado.device.memory=1MB -Dtornado.ptx.priority=100" uk.ac.manchester.tornado.unittests.fails.HeapFail#test03

      - name: "PTX: Native Tests"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          test-native.sh

      # ============== OpenCL Backend Tests ==============
      - name: "OpenCL (NVIDIA GPU): Unit Tests"
        timeout-minutes: 45
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test --verbose -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=2:0"

      - name: "OpenCL (NVIDIA GPU): Heap Fail Test"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test -V -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=2:0 -Dtornado.device.memory=1MB" uk.ac.manchester.tornado.unittests.fails.HeapFail#test03

      - name: "OpenCL (Intel iGPU): Unit Tests"
        timeout-minutes: 45
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test --verbose -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=2:1"

      - name: "OpenCL (Intel iGPU): Heap Fail Test"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test -V -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=2:1 -Dtornado.device.memory=1MB" uk.ac.manchester.tornado.unittests.fails.HeapFail#test03

      - name: "OpenCL: Native Tests"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          test-native.sh

      # ============== SPIR-V Backend Tests ==============
      - name: "SPIR-V (OpenCL Runtime): Unit Tests"
        timeout-minutes: 45
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test --verbose -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=1:0 -Dtornado.spirv.dispatcher=opencl"

      - name: "SPIR-V (OpenCL Runtime): Heap Fail Test"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test -V -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=1:0 -Dtornado.spirv.dispatcher=opencl -Dtornado.device.memory=1MB" uk.ac.manchester.tornado.unittests.fails.HeapFail#test03

      - name: "SPIR-V (LevelZero Runtime): Unit Tests"
        timeout-minutes: 45
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test --verbose -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=1:1 -Dtornado.spirv.dispatcher=levelzero"

      - name: "SPIR-V (LevelZero Runtime): Heap Fail Test"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          tornado-test -V -J"-Dtornado.ptx.priority=100 -Dtornado.unittests.device=1:1 -Dtornado.spirv.dispatcher=levelzero -Dtornado.device.memory=1MB" uk.ac.manchester.tornado.unittests.fails.HeapFail#test03

      - name: "SPIR-V: Native Tests"
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          source ${{ github.workspace }}/venv/bin/activate
          source setvars.sh
          test-native.sh

