name: 3 - Build Release SDKs [auto]

# Triggered via workflow_dispatch only:
#   - dispatched programmatically by 2-finalize-release-jdkXX.yml right after it
#     pushes each v<version>-jdkXX tag and creates the (draft) Release — this is
#     an explicit `gh workflow run` call, not an implicit push/release event,
#     because GITHUB_TOKEN-authored pushes/API calls don't trigger downstream
#     event-based workflow runs (push, release, etc). workflow_run is exempt
#     from that restriction but waits for the *entire* finalize workflow
#     (including the unrelated dev-version-bump job) to finish, so we dispatch
#     explicitly instead to fire as soon as the tag/Release exist.
#   - or manually, for smoke tests / recovery.
#
# Either way, the workflow only proceeds once BOTH the v<version>-jdk21 and
# v<version>-jdk25 (draft) Releases exist. The dispatch from whichever finalize
# completes first exits cleanly in preflight; the second dispatch actually
# builds and uploads.
#
# Both jdk21 and jdk25 finalize dispatch this workflow independently, so a
# given version is always dispatched twice. concurrency.group below is scoped
# per-version, so with cancel-in-progress: false, GitHub itself strictly
# serializes the two: the second dispatch's Preflight job doesn't even start
# until the first one's entire run (all platform jobs, cleanup, everything)
# has finished — no window where both could be mid-build at once, regardless
# of runner queueing/scheduling delays. Once the second one finally gets its
# turn, Preflight's "already built" marker check (a build-lock-<version_tag>
# / draft-test-built-<version_tag> git tag, created only once a run fully
# succeeds — never on failure, so a genuine retry isn't blocked) tells it the
# first dispatch already handled this version, and it exits cleanly instead
# of rebuilding.
#
# After all archives are uploaded, the two draft Releases are un-drafted and
# publish-archives-to-sdkman-jdkXX.yml is dispatched explicitly (same reasoning
# as above — un-drafting via GITHUB_TOKEN won't reliably fire `release: published`).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Base release version without v prefix or -jdkXX suffix (e.g. 4.0.1).'
        required: true
        type: string
        default: '4.0.1'
      include_macos:
        description: 'Run the macOS arm64 build job.'
        required: false
        type: boolean
        default: true
      include_linux:
        description: 'Run the Linux x64 build job.'
        required: false
        type: boolean
        default: true
      include_windows:
        description: 'Run the Windows x64 build job.'
        required: false
        type: boolean
        default: true
      upload_to_release:
        description: 'Upload built archives to the v<version>-jdk21 / v<version>-jdk25 GitHub Releases (must already exist).'
        required: false
        type: boolean
        default: true
      draft_release_test:
        description: 'Draft release (test): still build the SDKs for real, but never upload/un-draft/publish anything (forces upload_to_release off).'
        required: false
        type: boolean
        default: false

concurrency:
  # Scoped per-version (not a single global group) so unrelated versions
  # don't needlessly queue behind each other, but the two dispatches for the
  # *same* version (one from jdk21 finalize, one from jdk25 finalize) are
  # strictly serialized instead of racing.
  group: build-release-sdks-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    if: github.repository == 'beehive-lab/TornadoVM'
    name: Preflight (derive version, gate on Releases)
    runs-on: [self-hosted, Linux, x64]
    permissions:
      # Draft releases are only visible to tokens with push (write) access —
      # `contents: read` silently sees zero releases in the gate check below.
      contents: write
    timeout-minutes: 5
    outputs:
      version: ${{ steps.derive.outputs.version }}
      version_tag: ${{ steps.derive.outputs.version_tag }}
      proceed: ${{ steps.gate.outputs.proceed }}
      include_macos: ${{ steps.derive.outputs.include_macos }}
      include_linux: ${{ steps.derive.outputs.include_linux }}
      include_windows: ${{ steps.derive.outputs.include_windows }}
      upload_to_release: ${{ steps.derive.outputs.upload_to_release }}
      draft_release_test: ${{ steps.derive.outputs.draft_release_test }}
      marker_tag: ${{ steps.gate.outputs.marker_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version and flags
        id: derive
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          INCLUDE_MACOS="${{ inputs.include_macos }}"
          INCLUDE_LINUX="${{ inputs.include_linux }}"
          INCLUDE_WIN="${{ inputs.include_windows }}"
          UPLOAD="${{ inputs.upload_to_release }}"
          if [ "${{ inputs.draft_release_test }}" = "true" ]; then
            echo "Draft release (test): forcing upload_to_release=false (still building for real, nothing gets uploaded/un-drafted/published)."
            UPLOAD="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "include_macos=$INCLUDE_MACOS" >> "$GITHUB_OUTPUT"
          echo "include_linux=$INCLUDE_LINUX" >> "$GITHUB_OUTPUT"
          echo "include_windows=$INCLUDE_WIN" >> "$GITHUB_OUTPUT"
          echo "upload_to_release=$UPLOAD" >> "$GITHUB_OUTPUT"
          echo "draft_release_test=${{ inputs.draft_release_test }}" >> "$GITHUB_OUTPUT"
          echo "Derived: version=$VERSION include_macos=$INCLUDE_MACOS include_linux=$INCLUDE_LINUX include_windows=$INCLUDE_WIN upload=$UPLOAD"

      - name: Gate on both Releases existing / already built
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ steps.derive.outputs.draft_release_test }}" = "true" ]; then
            MARKER_TAG="draft-test-built-${{ steps.derive.outputs.version_tag }}"
          elif [ "${{ steps.derive.outputs.upload_to_release }}" = "true" ]; then
            MARKER_TAG="build-lock-${{ steps.derive.outputs.version_tag }}"
          else
            # Ad-hoc manual dispatch with upload_to_release=false that isn't
            # a draft_release_test either (e.g. a one-off smoke test of a
            # single platform) — deliberately no persistent marker for this
            # case. Otherwise a smoke test's success would permanently block
            # a real future release of the same version from ever building,
            # since it'd find a stale build-lock-<version_tag> already there.
            MARKER_TAG=""
          fi
          echo "marker_tag=$MARKER_TAG" >> "$GITHUB_OUTPUT"

          # Both jdk21 and jdk25 finalize dispatch this workflow
          # independently, so a given version is always dispatched twice.
          # concurrency.group (top of file) is scoped per-version, so the
          # second dispatch's Preflight doesn't even start until the first
          # dispatch's entire run has finished — no window where both could
          # be mid-build simultaneously. But that alone isn't enough: once
          # the second dispatch's Preflight finally runs, it would otherwise
          # pass the same checks the first one did (both Releases now exist
          # for real runs; nothing to check at all for draft runs) and
          # rebuild everything from scratch. MARKER_TAG is created (see the
          # mark-version-built job below) only once a run fully succeeds, so
          # checking for it here catches that case regardless of how long
          # the second dispatch was queued.
          if [ -n "$MARKER_TAG" ] && git ls-remote --exit-code --tags origin "refs/tags/$MARKER_TAG" >/dev/null 2>&1; then
            echo "$MARKER_TAG already exists — this version was already built successfully. Skipping."
            PROCEED="false"
          else
            PROCEED="true"
            if [ "${{ steps.derive.outputs.upload_to_release }}" = "true" ]; then
              # `gh release view`/the "get release by tag" API never returns
              # draft releases, and both jdk21/jdk25 Releases are created as
              # drafts by finalize — so list all releases (which does
              # include drafts) instead of looking each one up by tag.
              existing_tags=$(gh api "repos/${{ github.repository }}/releases" --paginate -q '.[].tag_name')
              for jdk in jdk21 jdk25; do
                tag="${{ steps.derive.outputs.version_tag }}-$jdk"
                if grep -qx "$tag" <<< "$existing_tags"; then
                  echo "Release $tag exists."
                else
                  echo "Release $tag does not exist yet."
                  PROCEED="false"
                fi
              done
            fi
          fi
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"
          if [ "$PROCEED" = "false" ]; then
            echo ""
            echo "Skipping build: either already built (see above), or both v${{ steps.derive.outputs.version }}-jdk21 and v${{ steps.derive.outputs.version }}-jdk25 Releases must exist first."
            echo "The next finalize completion will trigger another run."
          fi

  build-macos:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true' && needs.preflight.outputs.include_macos == 'true'
    name: macOS arm64 (jdk21+jdk25 × opencl+metal)
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      VERSION_TAG: ${{ needs.preflight.outputs.version_tag }}
      JDK21_HOME: /opt/jenkins/jdks/jdk-21.0.11+10/Contents/Home
      JDK25_HOME: /opt/jenkins/jdks/jdk-25.0.2/Contents/Home
      RELEASE_ARCHIVES_DIR: /opt/release-archives
      PLATFORM_DIR: macos-arm64
      VENV_PATH: /Users/beehiveUser/venv-build-sdks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify build script is present
        run: |
          if [ ! -f scripts/build-release-sdks.py ]; then
            echo "::error::scripts/build-release-sdks.py is missing on the dispatched branch."
            exit 1
          fi

      - name: Prepare output directory
        run: |
          mkdir -p "$RELEASE_ARCHIVES_DIR"
          rm -rf "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"

      - name: Use pre-provisioned Python venv
        run: |
          if [ ! -x "$VENV_PATH/bin/python3" ]; then
            echo "::error::$VENV_PATH is missing on this runner. Create it once with:"
            echo "  python3 -m venv $VENV_PATH && $VENV_PATH/bin/pip install --upgrade pip requests tqdm urllib3 wget packaging streamlit psutil"
            exit 1
          fi
          # Put the pre-provisioned venv's python3/pip3 first on PATH so
          # bin/compile's dependency self-heal (pip3 install requests/urllib3/
          # wget/packaging/streamlit) lands there instead of failing against
          # Homebrew's externally-managed system Python.
          echo "$VENV_PATH/bin" >> "$GITHUB_PATH"

      - name: Build SDKs
        run: |
          python3 scripts/build-release-sdks.py \
            --version "$VERSION_TAG" \
            --output-dir "$RELEASE_ARCHIVES_DIR" \
            --jdk21-home "$JDK21_HOME" \
            --jdk25-home "$JDK25_HOME"

      - name: List produced archives
        run: ls -lh "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR/"

      - name: Upload archives to matching Releases
        if: needs.preflight.outputs.upload_to_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          uploaded=0
          src_dir="$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"
          while IFS= read -r archive; do
            fname=$(basename "$archive")
            case "$fname" in
              *jdk21*) tag="$VERSION_TAG-jdk21" ;;
              *jdk25*) tag="$VERSION_TAG-jdk25" ;;
              *)
                echo "::warning::Skipping $fname — filename does not contain jdk21 or jdk25"
                continue
                ;;
            esac
            echo "→ $fname  →  release $tag"
            gh release upload "$tag" "$archive" --clobber --repo "${{ github.repository }}"
            uploaded=$((uploaded + 1))
          done < <(find "$src_dir" -type f \( -name '*.zip' -o -name '*.tar.gz' \) | sort)
          echo "Uploaded $uploaded archive(s) from macOS arm64."

      - name: Clean up test build archives
        if: needs.preflight.outputs.draft_release_test == 'true'
        run: |
          echo "Draft release (test): removing built archives from this runner — nothing was uploaded."
          rm -rf "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"

  build-linux:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true' && needs.preflight.outputs.include_linux == 'true'
    name: Linux x64 (jdk21+jdk25 × opencl+ptx+spirv+cuda+full)
    runs-on: [self-hosted, Linux, x64, sdk-builder]
    timeout-minutes: 240
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      VERSION_TAG: ${{ needs.preflight.outputs.version_tag }}
      JDK21_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      JDK25_HOME: /opt/jenkins/jdks/jdk-25.0.2
      RELEASE_ARCHIVES_DIR: /opt/release-archives
      PLATFORM_DIR: linux-amd64
      VENV_PATH: ${{ github.workspace }}/venv-build-sdks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify build script is present
        run: |
          if [ ! -f scripts/build-release-sdks.py ]; then
            echo "::error::scripts/build-release-sdks.py is missing on the dispatched branch."
            exit 1
          fi

      - name: Prepare output directory
        run: |
          mkdir -p "$RELEASE_ARCHIVES_DIR"
          rm -rf "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"

      - name: Setup Python venv
        run: |
          python3 -m venv "$VENV_PATH"
          # shellcheck disable=SC1091
          source "$VENV_PATH/bin/activate"
          pip install --upgrade pip tqdm psutil
          # Make the venv interpreter the default for subsequent steps
          echo "$VENV_PATH/bin" >> "$GITHUB_PATH"

      - name: Build SDKs
        run: |
          python3 scripts/build-release-sdks.py \
            --version "$VERSION_TAG" \
            --output-dir "$RELEASE_ARCHIVES_DIR" \
            --jdk21-home "$JDK21_HOME" \
            --jdk25-home "$JDK25_HOME"

      - name: List produced archives
        run: ls -lh "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR/"

      - name: Upload archives to matching Releases
        if: needs.preflight.outputs.upload_to_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          uploaded=0
          src_dir="$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"
          while IFS= read -r archive; do
            fname=$(basename "$archive")
            case "$fname" in
              *jdk21*) tag="$VERSION_TAG-jdk21" ;;
              *jdk25*) tag="$VERSION_TAG-jdk25" ;;
              *)
                echo "::warning::Skipping $fname — filename does not contain jdk21 or jdk25"
                continue
                ;;
            esac
            echo "→ $fname  →  release $tag"
            gh release upload "$tag" "$archive" --clobber --repo "${{ github.repository }}"
            uploaded=$((uploaded + 1))
          done < <(find "$src_dir" -type f \( -name '*.zip' -o -name '*.tar.gz' \) | sort)
          echo "Uploaded $uploaded archive(s) from Linux x64."

      - name: Clean up test build archives
        if: needs.preflight.outputs.draft_release_test == 'true'
        run: |
          echo "Draft release (test): removing built archives from this runner — nothing was uploaded."
          rm -rf "$RELEASE_ARCHIVES_DIR/$VERSION_TAG/$PLATFORM_DIR"

  build-windows:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true' && needs.preflight.outputs.include_windows == 'true'
    name: Windows x64 (jdk21+jdk25 × opencl+ptx+spirv+cuda)
    runs-on: [self-hosted, Windows, x64]
    timeout-minutes: 240
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      VERSION_TAG: ${{ needs.preflight.outputs.version_tag }}
      JDK21_HOME: 'C:\jdks\jdk21'
      JDK25_HOME: 'C:\jdks\jdk25'
      RELEASE_ARCHIVES_DIR: 'C:\release-archives'
      PLATFORM_DIR: windows-amd64
      VENV_PATH: '${{ github.workspace }}\venv-build-sdks'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify build script is present
        shell: cmd
        run: |
          if not exist scripts\build-release-sdks.py (
            echo ::error::scripts\build-release-sdks.py is missing on the dispatched branch.
            exit /b 1
          )

      - name: Prepare output directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:RELEASE_ARCHIVES_DIR | Out-Null
          $platformPath = Join-Path $env:RELEASE_ARCHIVES_DIR (Join-Path $env:VERSION_TAG $env:PLATFORM_DIR)
          if (Test-Path $platformPath) {
            # Files here may be owned by an interactive account (not the runner's
            # NETWORK SERVICE), which strips inherited ACLs. Take ownership and
            # grant this service account rights before attempting removal.
            icacls $platformPath /setowner "NT AUTHORITY\NETWORK SERVICE" /T /C | Out-Null
            icacls $platformPath /grant "NT AUTHORITY\NETWORK SERVICE:(OI)(CI)F" /T /C | Out-Null
            Remove-Item -Recurse -Force $platformPath
          }

      - name: Setup Python venv
        shell: powershell
        run: |
          if (Test-Path $env:VENV_PATH) {
            Remove-Item -Recurse -Force $env:VENV_PATH
          }
          python -m venv "$env:VENV_PATH"
          & "$env:VENV_PATH\Scripts\python.exe" -m pip install --upgrade pip
          & "$env:VENV_PATH\Scripts\pip.exe" install requests tqdm urllib3 wget packaging streamlit psutil pyinstaller
          # Put the venv's Scripts\ first on PATH so `python`, `pip3`, and
          # `pyinstaller` all resolve here for every later step (including the
          # nested `python bin\compile` invocations inside each worktree) —
          # matching the Linux/macOS jobs, which already do this. Without it,
          # bin/compile's dependency self-heal (install_python_modules.py) and
          # the PyInstaller .exe wrapper build fall back to whatever bare
          # system Python/pip happen to be on the runner's PATH, which may be
          # missing required packages entirely.
          echo "$env:VENV_PATH\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build SDKs
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat" -startdir=none -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b 1
          python scripts\build-release-sdks.py ^
            --version %VERSION_TAG% ^
            --output-dir "%RELEASE_ARCHIVES_DIR%" ^
            --jdk21-home "%JDK21_HOME%" ^
            --jdk25-home "%JDK25_HOME%"

      - name: List produced archives
        shell: cmd
        run: dir "%RELEASE_ARCHIVES_DIR%\%VERSION_TAG%\%PLATFORM_DIR%"

      - name: Upload archives to matching Releases
        if: needs.preflight.outputs.upload_to_release == 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $srcDir = Join-Path $env:RELEASE_ARCHIVES_DIR (Join-Path $env:VERSION_TAG $env:PLATFORM_DIR)
          $uploaded = 0
          Get-ChildItem -Path $srcDir -Include *.zip,*.tar.gz -File -Recurse | Sort-Object Name | ForEach-Object {
            $fname = $_.Name
            if ($fname -match 'jdk21') {
              $tag = "$env:VERSION_TAG-jdk21"
            } elseif ($fname -match 'jdk25') {
              $tag = "$env:VERSION_TAG-jdk25"
            } else {
              Write-Host "::warning::Skipping $fname - filename does not contain jdk21 or jdk25"
              return
            }
            Write-Host "-> $fname  ->  release $tag"
            gh release upload $tag $_.FullName --clobber --repo "${{ github.repository }}"
            if ($LASTEXITCODE -ne 0) { throw "gh release upload failed for $fname" }
            $uploaded++
          }
          Write-Host "Uploaded $uploaded archive(s) from Windows x64."

      - name: Clean up test build archives
        if: needs.preflight.outputs.draft_release_test == 'true'
        shell: powershell
        run: |
          Write-Host "Draft release (test): removing built archives from this runner - nothing was uploaded."
          $platformPath = Join-Path $env:RELEASE_ARCHIVES_DIR (Join-Path $env:VERSION_TAG $env:PLATFORM_DIR)
          if (Test-Path $platformPath) {
            Remove-Item -Recurse -Force $platformPath
          }

  publish-releases:
    name: Un-draft Releases and dispatch SDKMAN publish
    needs: [preflight, build-macos, build-linux, build-windows]
    if: |
      always() &&
      needs.preflight.outputs.proceed == 'true' &&
      needs.preflight.outputs.upload_to_release == 'true' &&
      needs.build-macos.result == 'success' &&
      needs.build-linux.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: [self-hosted, Linux, x64]
    permissions:
      contents: write
      actions: write
    timeout-minutes: 10
    steps:
      - name: Un-draft both Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for jdk in jdk21 jdk25; do
            tag="${{ needs.preflight.outputs.version_tag }}-$jdk"
            echo "Publishing $tag (un-drafting)..."
            gh release edit "$tag" --draft=false --repo "${{ github.repository }}"
          done
          echo "Both Releases are now public."

      - name: Dispatch SDKMAN publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh release edit above ran with GITHUB_TOKEN, and GitHub does not let
          # GITHUB_TOKEN-authored actions trigger further event-based workflow runs
          # (push/release/etc — workflow_run is the one exception). So the un-draft
          # above will NOT reliably fire publish-archives-to-sdkman-jdkXX.yml's
          # `release: published` trigger. Dispatch it explicitly instead.
          for jdk in jdk21 jdk25; do
            tag="${{ needs.preflight.outputs.version_tag }}-$jdk"
            echo "Dispatching publish-archives-to-sdkman-$jdk.yml for $tag..."
            gh workflow run "publish-archives-to-sdkman-$jdk.yml" \
              --repo "${{ github.repository }}" \
              -f tag="$tag" \
              -f publish=true
          done
          echo "Dispatched SDKMAN publish for both jdk21 and jdk25."

      - name: Summary
        run: |
          {
            echo "## Release ${{ needs.preflight.outputs.version }} archives published"
            echo ""
            echo "| Release | Status |"
            echo "|---------|--------|"
            echo "| [v${{ needs.preflight.outputs.version }}-jdk21](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.preflight.outputs.version }}-jdk21) | Published |"
            echo "| [v${{ needs.preflight.outputs.version }}-jdk25](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.preflight.outputs.version }}-jdk25) | Published |"
            echo ""
            echo "Downstream: \`publish-archives-to-sdkman-jdkXX\` dispatched explicitly above. \`deploy-maven-central-jdkXX\` runs via workflow_run on finalize completion."
          } >> "$GITHUB_STEP_SUMMARY"

  mark-version-built:
    name: Mark this version as built
    needs: [preflight, build-macos, build-linux, build-windows]
    # Only mark it once every requested platform actually succeeded (a
    # platform job shows 'skipped' only when its include_* flag was false,
    # since this job itself requires proceed == 'true'). On a partial/full
    # failure, deliberately do NOT create the marker, so the next dispatch
    # for this version (a manual retry, or the next finalize completion)
    # sees no marker and proceeds normally instead of being blocked forever.
    # marker_tag is empty for ad-hoc smoke-test dispatches (see Preflight) —
    # nothing to mark in that case.
    if: |
      always() &&
      needs.preflight.outputs.proceed == 'true' &&
      needs.preflight.outputs.marker_tag != '' &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: [self-hosted, Linux, x64]
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push marker tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MARKER_TAG="${{ needs.preflight.outputs.marker_tag }}"
          git tag -a "$MARKER_TAG" -m "Built successfully by run ${{ github.run_id }} (${{ github.run_attempt }})"
          git push origin "$MARKER_TAG"
          echo "Marked $MARKER_TAG — future dispatches for this version will skip rebuilding."
