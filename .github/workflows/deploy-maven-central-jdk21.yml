name: 4.1 - Deploy Maven Central JDK21 [auto]

on:
  push:
    tags:
      - 'v*-jdk21'
  workflow_run:
    workflows: ["2.1 - Finalize Release JDK21 [auto]"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v2.1.0-jdk21)'
        required: false
        type: string

jobs:
  deploy:
    # When triggered by workflow_run, only proceed if the upstream finalize workflow succeeded.
    # (Other triggers — push tag, workflow_dispatch — are unaffected.)
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    name: Deploy to Maven Central (JDK 21)
    runs-on: [self-hosted, Linux, x64]
    timeout-minutes: 15
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      MAVEN_HOME: /opt/maven
      GRAAL_JARS: /opt/graalJars
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH

      - name: Copy GraalVM JARs
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_PASSWORD}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>gpg</id>
                <properties>
                  <gpg.executable>gpg</gpg.executable>
                  <gpg.keyname>${env.GPG_KEYNAME}</gpg.keyname>
                  <gpg.passphrase>${env.GPG_PASSPHRASE}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>gpg</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_TTY: $(tty)

      - name: Check whether the triggering finalize run was a draft test
        id: check_draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IS_DRAFT="false"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # A draft_release_test run of 2.1 finalize skips "Create GitHub
            # Release" (it runs "Dry run - GitHub Release" instead), so
            # check that step's conclusion on the triggering run to tell
            # real from draft — workflow_dispatch inputs aren't easily
            # queryable after the fact via the runs API.
            CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" --paginate \
              -q '.jobs[].steps[]? | select(.name == "Create GitHub Release") | .conclusion' || true)
            if [ "$CONCLUSION" != "success" ]; then
              IS_DRAFT="true"
            fi
          fi
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "Triggering event: ${{ github.event_name }}, is_draft=$IS_DRAFT"

      - name: Deploy to Maven Central
        if: steps.check_draft.outputs.is_draft != 'true'
        run: |
          mvn clean deploy \
            -pl tornado-api,tornado-runtime,tornado-matrices \
            -am \
            -P release \
            -DskipTests \
            --batch-mode
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_KEYNAME: ${{ secrets.GPG_KEYNAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Draft release (test) - Maven Central
        if: steps.check_draft.outputs.is_draft == 'true'
        run: |
          echo "Draft release (test): skipping the actual Maven Central deploy (mvn clean deploy -P release ...)."
          echo "Everything up to this point (checkout, GraalVM jars, Maven settings, GPG import) ran for real."
