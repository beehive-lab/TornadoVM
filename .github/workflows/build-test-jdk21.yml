name: Build & Test [JDK 21]

on:
  push:
    branches: [master]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  code-quality:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, Linux, x64]
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      MAVEN_HOME: /opt/maven
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4            # Updated from v3

      - name: Run Checkstyle
        run: |
          export PATH=$JAVA_HOME/bin:$MAVEN_HOME/bin:$PATH
          ./mvnw checkstyle:check

  # OpenCL first
  build-opencl:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, Linux, x64]
    needs: code-quality
    timeout-minutes: 30
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      CMAKE_ROOT: /opt/jenkins/cmake-3.25.2-linux-x86_64
      MAVEN_HOME: /opt/maven
      GRAAL_JARS: /opt/graalJars
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-opencl
      JAVAFX_SDK: /opt/jenkins/javafx-sdk-21.0.11
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil   # Combined

      - name: Build TornadoVM (opencl)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=opencl

      - name: Run opencl fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          tornado --devices
          make fast-tests

      - name: Build & run TornadoVM-Ray-Tracer (regression)
        timeout-minutes: 10
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          rm -rf TornadoVM-Ray-Tracer
          git clone --depth 1 --branch master https://github.com/beehive-lab/TornadoVM-Ray-Tracer.git
          cd TornadoVM-Ray-Tracer
          export TORNADO_RAY_TRACER_ROOT="$PWD"
          mvn clean install
          ./bin/tornadovm-ray-tracer regression

  # PTX after OpenCL
  build-ptx:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, Linux, x64]
    needs: build-opencl                      # Waits for OpenCL
    timeout-minutes: 20
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      CMAKE_ROOT: /opt/jenkins/cmake-3.25.2-linux-x86_64
      MAVEN_HOME: /opt/maven
      GRAAL_JARS: /opt/graalJars
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-ptx
      JAVAFX_SDK: /opt/jenkins/javafx-sdk-21.0.11
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil

      - name: Build TornadoVM (ptx)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=ptx

      - name: Run ptx fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          make fast-tests

      - name: Build & run TornadoVM-Ray-Tracer (regression)
        timeout-minutes: 10
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          rm -rf TornadoVM-Ray-Tracer
          git clone --depth 1 --branch master https://github.com/beehive-lab/TornadoVM-Ray-Tracer.git
          cd TornadoVM-Ray-Tracer
          export TORNADO_RAY_TRACER_ROOT="$PWD"
          mvn clean install
          ./bin/tornadovm-ray-tracer regression

  # CUDA backend (generates CUDA C, compiled to PTX via NVRTC, executed through the CUDA Driver API).
  #
  # NOTE: The CUDA backend requires an NVIDIA GPU plus the CUDA Toolkit (NVRTC + libcuda) at runtime.
  # Standard GitHub-hosted runners have NO NVIDIA GPU/CUDA, so the kernel-execution tests below can
  # only run on a self-hosted CUDA runner (the same [self-hosted, Linux, x64] runner that the PTX job
  # uses). If this workflow is ever ported to GitHub-hosted runners, this job must be reduced to a
  # build-only job (e.g. `./mvnw -Pjdk21,cuda-backend -pl tornado-drivers/cuda,tornado-drivers/cuda-jni -am compile`)
  # and the "Run cuda fast unit tests" step removed, since GPU execution would fail there.
  #
  # IMPORTANT: build the CUDA backend ON ITS OWN (BACKEND=cuda, not cuda,opencl). With both backends
  # installed the unit tests can silently run on the OpenCL device and report false positives. A
  # CUDA-only build exposes a single backend (Tornado device 0:0), so the results are unambiguous.
  build-cuda:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, Linux, x64]
    needs: build-ptx                         # Serialize after PTX (shares the NVIDIA GPU runner)
    timeout-minutes: 20
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      CMAKE_ROOT: /opt/jenkins/cmake-3.25.2-linux-x86_64
      MAVEN_HOME: /opt/maven
      GRAAL_JARS: /opt/graalJars
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-cuda
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil

      - name: Build TornadoVM (cuda)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=cuda

      - name: Run cuda fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          tornado --devices
          # CUDA-only build => single backend, default device 0:0 (the NVIDIA GPU).
          make fast-tests

  # SPIRV parallel with OpenCL/PTX chain
  build-spirv:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, Linux, x64]
    needs: code-quality                      # Only waits for code-quality
    timeout-minutes: 20
    env:
      JAVA_HOME: /opt/jenkins/jdks/graal-23.1.0/jdk-21.0.3
      CMAKE_ROOT: /opt/jenkins/cmake-3.25.2-linux-x86_64
      MAVEN_HOME: /opt/maven
      GRAAL_JARS: /opt/graalJars
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-spirv
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil

      - name: Build TornadoVM (spirv)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=spirv

      - name: Run spirv fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          make fast-tests
  build-macOs-opencl:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, macOS, arm64]
    needs: code-quality
    timeout-minutes: 45
    env:
      JAVA_HOME: /opt/jenkins/jdks/graalvm-community-openjdk-21.0.1+12.1/Contents/Home
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-opencl
      CMAKE_ROOT: /opt/homebrew/bin/cmake
      MAVEN_HOME: /opt/homebrew/bin/mvn
      GRAAL_JARS: /opt/graalJars
      JAVAFX_SDK: /opt/jenkins/javafx-sdk-21.0.11
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil

      - name: Build TornadoVM (opencl)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=opencl

      - name: Run opencl fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          tornado --devices
          make fast-tests

      - name: Build & run TornadoVM-Ray-Tracer (regression)
        timeout-minutes: 10
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          rm -rf TornadoVM-Ray-Tracer
          git clone --depth 1 --branch master https://github.com/beehive-lab/TornadoVM-Ray-Tracer.git
          cd TornadoVM-Ray-Tracer
          export TORNADO_RAY_TRACER_ROOT="$PWD"
          mvn clean install
          ./bin/tornadovm-ray-tracer regression
  build-macOs-metal:
    if: |
      github.repository == 'beehive-lab/TornadoVM' &&
      !(github.event_name == 'push' && contains(github.event.head_commit.message, 'from beehive-lab/release/'))
    runs-on: [self-hosted, macOS, arm64]
    needs: code-quality
    timeout-minutes: 45
    env:
      JAVA_HOME: /opt/jenkins/jdks/graalvm-community-openjdk-21.0.1+12.1/Contents/Home
      TORNADO_ROOT: ${{ github.workspace }}
      TORNADOVM_HOME: ${{ github.workspace }}/bin/sdk
      VENV_PATH: ${{ github.workspace }}/venv-opencl
      CMAKE_ROOT: /opt/homebrew/bin/cmake
      MAVEN_HOME: /opt/homebrew/bin/mvn
      GRAAL_JARS: /opt/graalJars
      JAVAFX_SDK: /opt/jenkins/javafx-sdk-21.0.11
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          echo "$MAVEN_HOME/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Setup Python venv
        run: |
          python3 -m venv $VENV_PATH
          source $VENV_PATH/bin/activate
          pip install --upgrade pip tqdm psutil

      - name: Build TornadoVM (metal)
        run: |
          mkdir -p graalJars && cp $GRAAL_JARS/* graalJars/
          source $VENV_PATH/bin/activate
          make jdk21 BACKEND=metal

      - name: Run metal fast unit tests
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          tornado --devices
          make fast-tests

      - name: Build & run TornadoVM-Ray-Tracer (regression)
        timeout-minutes: 10
        run: |
          source $VENV_PATH/bin/activate
          source setvars.sh
          rm -rf TornadoVM-Ray-Tracer
          git clone --depth 1 --branch master https://github.com/beehive-lab/TornadoVM-Ray-Tracer.git
          cd TornadoVM-Ray-Tracer
          export TORNADO_RAY_TRACER_ROOT="$PWD"
          mvn clean install
          ./bin/tornadovm-ray-tracer regression
